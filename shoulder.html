<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoulder Joint Muscle Challenge</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.option{
    background:#334155;
    color:white;
}

.correct{
    background:green !important;
}

.wrong{
    background:red !important;
}

#nextBtn{
    background:#2563eb;
    color:white;
    display:none;
}

h1{
    color:#38bdf8;
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 Shoulder Joint Muscle Challenge</h1>

<h3 id="score">Score: 0</h3>

<div class="card">

<h2 id="question"></h2>

<div id="options"></div>

<button id="nextBtn" onclick="nextQuestion()">Next Question</button>

</div>

</div>

<script>

const quiz = [

{
question:"Which muscle initiates shoulder abduction?",
options:["Supraspinatus","Latissimus Dorsi","Teres Major","Pectoralis Major"],
answer:"Supraspinatus"
},

{
question:"Origin of Supraspinatus?",
options:["Supraspinous Fossa","Infraglenoid Tubercle","Coracoid Process","Acromion"],
answer:"Supraspinous Fossa"
},

{
question:"Insertion of Deltoid?",
options:["Deltoid Tuberosity","Lesser Tubercle","Greater Tubercle","Coracoid Process"],
answer:"Deltoid Tuberosity"
},

{
question:"Primary action of Infraspinatus?",
options:["External Rotation","Flexion","Adduction","Internal Rotation"],
answer:"External Rotation"
},

{
question:"Which muscle performs shoulder internal rotation?",
options:["Subscapularis","Infraspinatus","Teres Minor","Supraspinatus"],
answer:"Subscapularis"
},

{
question:"Origin of Subscapularis?",
options:["Subscapular Fossa","Spine of Scapula","Acromion","Clavicle"],
answer:"Subscapular Fossa"
},

{
question:"Insertion of Supraspinatus?",
options:["Greater Tubercle","Lesser Tubercle","Coracoid Process","Deltoid Tuberosity"],
answer:"Greater Tubercle"
},

{
question:"Which muscle extends and adducts shoulder?",
options:["Latissimus Dorsi","Deltoid","Supraspinatus","Teres Minor"],
answer:"Latissimus Dorsi"
},

{
question:"Which is NOT a rotator cuff muscle?",
options:["Deltoid","Supraspinatus","Infraspinatus","Subscapularis"],
answer:"Deltoid"
},

{
question:"Action of Teres Minor?",
options:["External Rotation","Flexion","Abduction","Internal Rotation"],
answer:"External Rotation"
}

];

let current = 0;
let score = 0;

const question = document.getElementById("question");
const options = document.getElementById("options");
const scoreDisplay = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion(){

let q = quiz[current];

question.innerText = q.question;

options.innerHTML = "";

q.options.forEach(option => {

let btn = document.createElement("button");

btn.innerText = option;
btn.classList.add("option");

btn.onclick = () => checkAnswer(btn, option);

options.appendChild(btn);

});

nextBtn.style.display = "none";
}

function checkAnswer(button, selected){

let correct = quiz[current].answer;

document.querySelectorAll(".option").forEach(btn => {

btn.disabled = true;

if(btn.innerText === correct){
btn.classList.add("correct");
}

});

if(selected !== correct){
button.classList.add("wrong");
}
else{
score += 10;
scoreDisplay.innerText = "Score: " + score;
}

nextBtn.style.display = "block";
}

function nextQuestion(){

current++;

if(current < quiz.length){
loadQuestion();
}
else{

question.innerHTML =
"🎉 Congratulations! Final Score: " +
score + "/" + (quiz.length*10);

options.innerHTML = "";
nextBtn.style.display = "none";
}

}

loadQuestion();

</script>

</body>
</html>
